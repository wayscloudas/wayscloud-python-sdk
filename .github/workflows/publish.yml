name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and publish wayscloud SDK
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Validate package
        run: twine check dist/*

      - name: Check version not already on PyPI
        run: |
          VERSION=$(python -c "from wayscloud._version import __version__; print(__version__)")
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/wayscloud/${VERSION}/json")
          if [ "$STATUS" = "200" ]; then
            echo "::error::Version ${VERSION} already exists on PyPI"
            exit 1
          fi
          echo "Version ${VERSION} is new — proceeding"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
